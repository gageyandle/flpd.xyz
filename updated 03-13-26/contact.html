<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact / flpd.xyz</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="../images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Gage Y.</a>
    <ul class="nav-links">
      <li><a href="skills.html">Toolbox</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <main class="narrow">
    <div class="page-tag">✉ contact</div>
    <h1>Let's <span class="grad-purple">talk.</span></h1>
    <p class="subtitle">Have a question or want to work together? Drop a message below.</p>

    <div class="form-card">
      <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="d72b2cce-ad25-497d-977b-e9e6772e7ceb">
        <input type="hidden" name="redirect" value="thanks.html">
        <input type="checkbox" name="botcheck" class="hidden">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" class="form-input" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message →</button>
      </form>
    </div>
  </main>

  <footer>flpd.xyz 2026 and Beyond</footer>
</body>
</html>
